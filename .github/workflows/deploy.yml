name: Deploy to AWS ECS

on:
  push:
    branches: [main]
  workflow_dispatch:  # allows manual trigger from GitHub UI

concurrency:
  group: production
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: datalineage-ai
  ECS_CLUSTER: datalineage-prod-Cluster-iRmz9OMUAkHc
  ECS_SERVICE_PREFIX: datalineage-prod-api

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:latest \
            .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

      - name: Force new ECS deployment
        run: |
          # Find the ECS service name (it has a random suffix from Copilot)
          SERVICE_ARN=$(aws ecs list-services \
            --cluster ${{ env.ECS_CLUSTER }} \
            --query "serviceArns[?contains(@, '${{ env.ECS_SERVICE_PREFIX }}')]|[0]" \
            --output text)

          if [ -z "$SERVICE_ARN" ] || [ "$SERVICE_ARN" = "None" ]; then
            echo "::error::ECS service not found in cluster ${{ env.ECS_CLUSTER }}"
            exit 1
          fi

          echo "Forcing new deployment for: $SERVICE_ARN"
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service "$SERVICE_ARN" \
            --force-new-deployment

      - name: Wait for deployment to stabilize
        run: |
          SERVICE_ARN=$(aws ecs list-services \
            --cluster ${{ env.ECS_CLUSTER }} \
            --query "serviceArns[?contains(@, '${{ env.ECS_SERVICE_PREFIX }}')]|[0]" \
            --output text)

          echo "Waiting for service to stabilize (up to 5 minutes)..."
          aws ecs wait services-stable \
            --cluster ${{ env.ECS_CLUSTER }} \
            --services "$SERVICE_ARN" \
            || echo "::warning::Service did not stabilize within timeout"

      - name: Post-deploy health check
        run: |
          # Get the ALB URL from the ECS service's load balancer
          PROD_URL="http://datali-Publi-qsZNW7jcIFUB-1558367737.us-east-1.elb.amazonaws.com"
          echo "Checking $PROD_URL/api/v1/health"

          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$PROD_URL/api/v1/health" || true)
            if [ "$STATUS" = "200" ]; then
              echo "::notice::Health check passed (HTTP $STATUS)"
              exit 0
            fi
            echo "Attempt $i: HTTP $STATUS — retrying in 10s..."
            sleep 10
          done
          echo "::warning::Health check did not pass after 5 attempts"
