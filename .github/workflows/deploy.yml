name: Deploy to AWS App Runner

on:
  push:
    branches: [main]
  workflow_dispatch:  # allows manual trigger from GitHub UI

# Cancel in-progress deployments when a newer commit lands on main
concurrency:
  group: production
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: datalineage-ai
  APP_RUNNER_SERVICE: datalineage-ai

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Only run if tests have passed
    needs: []  # This workflow is triggered by push, test workflow runs in parallel
    # App Runner deploys need AWS credentials configured as GitHub secrets:
    #   AWS_ACCESS_KEY_ID
    #   AWS_SECRET_ACCESS_KEY
    # Or better, use OIDC with an IAM role (no long-lived keys):
    #   AWS_ROLE_TO_ASSUME = arn:aws:iam::ACCOUNT:role/GithubActionsDeploy
    permissions:
      id-token: write   # for OIDC
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          # Use ONE of these two auth methods:
          # Option A: OIDC (recommended — no long-lived keys)
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          # Option B: Access keys (uncomment if not using OIDC)
          # aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          # aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:latest \
            .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Trigger App Runner deployment
        run: |
          SERVICE_ARN=$(aws apprunner list-services \
            --query "ServiceSummaryList[?ServiceName=='${{ env.APP_RUNNER_SERVICE }}'].ServiceArn" \
            --output text)

          if [ -z "$SERVICE_ARN" ]; then
            echo "::error::App Runner service '${{ env.APP_RUNNER_SERVICE }}' not found."
            echo "Create it first using the steps in DEPLOY.md"
            exit 1
          fi

          echo "Starting deployment for $SERVICE_ARN"
          aws apprunner start-deployment --service-arn "$SERVICE_ARN"

      - name: Wait for deployment to complete
        run: |
          SERVICE_ARN=$(aws apprunner list-services \
            --query "ServiceSummaryList[?ServiceName=='${{ env.APP_RUNNER_SERVICE }}'].ServiceArn" \
            --output text)

          # Poll until status is RUNNING (or 10 minutes elapsed)
          for i in $(seq 1 60); do
            STATUS=$(aws apprunner describe-service \
              --service-arn "$SERVICE_ARN" \
              --query 'Service.Status' --output text)
            echo "Attempt $i: Status = $STATUS"
            if [ "$STATUS" = "RUNNING" ]; then
              echo "::notice::Deployment complete"
              exit 0
            fi
            if [ "$STATUS" = "CREATE_FAILED" ] || [ "$STATUS" = "OPERATION_IN_PROGRESS" ]; then
              sleep 10
              continue
            fi
            sleep 10
          done
          echo "::error::Deployment did not complete within 10 minutes"
          exit 1

      - name: Post-deploy health check
        run: |
          SERVICE_URL=$(aws apprunner list-services \
            --query "ServiceSummaryList[?ServiceName=='${{ env.APP_RUNNER_SERVICE }}'].ServiceUrl" \
            --output text)
          echo "Checking https://$SERVICE_URL/api/v1/health"
          curl -fsS "https://$SERVICE_URL/api/v1/health" || exit 1
          echo "::notice::Health check passed at https://$SERVICE_URL"
